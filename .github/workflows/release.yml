name: Release desktop app

# Push a tag like v0.1.0 to build and publish installers to GitHub Releases.
# Installed apps check that release feed and update themselves.
on:
  push:
    tags:
      - "v*"

# electron-builder needs write access to create the GitHub Release + upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Root deps are needed to build the renderer (Vite).
      - run: npm ci
      - run: npm --prefix desktop ci

      # Builds renderer + main, then electron-builder publishes to Releases.
      - run: npm --prefix desktop run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Developer ID: don't attempt real signing (afterPack.cjs ad-hoc signs).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # macOS code signing + notarization (required for macOS auto-update).
          # Add these repo secrets when you're ready to sign:
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
