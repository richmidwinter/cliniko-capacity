appId: com.example.cliniko-capacity
productName: Cliniko Capacity
directories:
  output: release
# Bundled main/preload live in build/; the renderer is copied in as a resource.
files:
  - build/**
extraResources:
  - from: renderer
    to: renderer
# Ad-hoc sign the macOS app so it launches on Apple Silicon (see afterPack.cjs).
afterPack: ./afterPack.cjs
# Auto-update source. Set these to your GitHub repo; a tagged release published
# here is what installed apps check against.
publish:
  provider: github
  owner: richmidwinter
  repo: cliniko-capacity
  # Publish directly (electron-builder defaults to a hidden *draft* release,
  # which others — and the auto-updater — can't see).
  releaseType: release
mac:
  # Universal = one .dmg that runs on both Apple Silicon and Intel Macs.
  target:
    - target: dmg
      arch: universal
  category: public.app-category.healthcare-fitness
  # No Developer ID yet. We DON'T set `identity: null` — that skips signing
  # entirely, and an unsigned arm64 app is reported as "damaged" on Apple
  # Silicon. Leaving identity unset lets electron-builder ad-hoc sign, so the
  # app launches after the normal Gatekeeper bypass (right-click → Open).
  # To sign + notarize properly later (removes the warning, enables macOS
  # auto-update), set:
  #   identity: "Developer ID Application: Your Name (TEAMID)"
  # plus the CSC_*/APPLE_* secrets in .github/workflows/release.yml.
win:
  target: nsis
linux:
  target: AppImage
